<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a18cd1"/>
      <stop offset="1" stop-color="#fbc2eb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- simple friendly avatar silhouette -->
  <circle cx="200" cy="155" r="70" fill="#ffffff" opacity="0.92"/>
  <path d="M 80 400 Q 80 270 200 270 Q 320 270 320 400 Z" fill="#ffffff" opacity="0.92"/>
  <!-- little flower -->
  <g transform="translate(295,90)">
    <circle cx="0" cy="-14" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="13" cy="-4" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="8" cy="11" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="-8" cy="11" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="-13" cy="-4" r="9" fill="#fff" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#f6d365"/>
  </g>
  <text x="200" y="375" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#7c6ce0" font-weight="bold">replace me with your photo!</text>
</svg>
